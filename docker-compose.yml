services:
  mysql:
    image: mysql:8.0
    container_name: lifepulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lifepulse
      MYSQL_USER: lifepulse
      MYSQL_PASSWORD: lifepulse123
    ports:
      - "3307:3306"
    volumes:
      - lifepulse_mysql_data:/var/lib/mysql
      - ./deploy/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: lifepulse-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lifepulse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nacos:
    image: nacos/nacos-server:v2.4.2
    container_name: lifepulse-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.0
    container_name: lifepulse-rocketmq-namesrv
    command: ["sh", "mqnamesrv"]
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.0
    container_name: lifepulse-rocketmq-broker
    user: root
    command: ["sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "-c", "/home/rocketmq/rocketmq-5.3.0/conf/broker.conf"]
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - ./deploy/rocketmq-broker.conf:/home/rocketmq/rocketmq-5.3.0/conf/broker.conf:ro
      - lifepulse_rocketmq_store:/home/rocketmq/store

  app:
    build: .
    container_name: lifepulse-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
      nacos:
        condition: service_started
    ports:
      - "8110:8110"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LOG_PATH: /app/logs
      LIFEPULSE_AI_API_KEY: ${LIFEPULSE_AI_API_KEY:-}
      LIFEPULSE_AI_BASE_URL: ${LIFEPULSE_AI_BASE_URL:-https://api.deepseek.com/chat/completions}
      LIFEPULSE_AI_MODEL: ${LIFEPULSE_AI_MODEL:-deepseek-chat}
    volumes:
      - lifepulse_app_logs:/app/logs

  nginx:
    build:
      context: ./frontend
    container_name: lifepulse-nginx
    depends_on:
      - app
    ports:
      - "8088:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: lifepulse-prometheus
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: lifepulse-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - lifepulse_grafana_data:/var/lib/grafana

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: lifepulse-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - lifepulse_elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: lifepulse-logstash
    depends_on:
      - elasticsearch
    volumes:
      - ./deploy/logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - lifepulse_app_logs:/usr/share/logstash/app-logs:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: lifepulse-kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

volumes:
  lifepulse_mysql_data:
  lifepulse_redis_data:
  lifepulse_rocketmq_store:
  lifepulse_grafana_data:
  lifepulse_app_logs:
  lifepulse_elasticsearch_data:
